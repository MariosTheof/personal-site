replicaCount: 2

imagePullSecrets:
  - name: ghcr-secret

image:
  repository: ghcr.io/mariostheof/earth
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
